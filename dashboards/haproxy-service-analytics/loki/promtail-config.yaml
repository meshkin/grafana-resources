server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 1048576  # 1MB
    batchwait: 1s
    timeout: 30s

scrape_configs:
  - job_name: haproxy
    static_configs:
      - targets:
          - localhost
        labels:
          job: haproxy
          instance: ${HOSTNAME}
          __path__: /var/log/haproxy.log
    pipeline_stages:
      - regex:
          expression: "^(?P<timestamp>\\w{3}\\s+\\d+\\s+\\d+:\\d+:\\d+)\\s+(?P<hostname>[\\w-]+)\\s+haproxy\\[(?P<pid>\\d+)\\]:\\s+(?P<json_payload>.*)$"
      - output:
          source: json_payload
      - json:
          source: json_payload
          expressions:
            status: status
            host: host
            backend: backend_name
      - labels:
          status:
          host:
          backend:
